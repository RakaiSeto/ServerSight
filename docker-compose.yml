services:
  backend:
    container_name: serversight_be
    image: ghcr.io/rakaiseto/serversight_be:latest
    secrets:
      - server-monitoring
    ports:
      - "127.0.0.1:20999:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    container_name: serversight_fe
    image: ghcr.io/rakaiseto/serversight_fe:latest
    ports:
      - "127.0.0.1:21999:3000"
    depends_on:
      - backend

secrets:
  server-monitoring:
    file: /opt/secrets/server_monitoring_credentials.txt