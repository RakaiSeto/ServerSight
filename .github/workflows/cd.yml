name: cd

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BE_IMAGE: rakaiseto/serversight_be
  FE_IMAGE: rakaiseto/serversight_fe

jobs:
  cd:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # WORKFLOW META
      # =========================
      - name: Set metadata
        run: |
          echo "WORKFLOW=CD – ServerSight" >> $GITHUB_ENV
          echo "STATUS=RUNNING" >> $GITHUB_ENV
          echo "STAGE=deploy" >> $GITHUB_ENV
          echo "START=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV
          echo "LOGS_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV

      # =========================
      # BUILD & PUSH DOCKER
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push BE
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BE_IMAGE }}:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push FE
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FE_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # DEPLOY VIA SSH
      # =========================
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2233
          script: |
            cd /github/serversight
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose pull
            docker compose up -d
